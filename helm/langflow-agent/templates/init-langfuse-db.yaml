{{- if and .Values.postgresql.enabled .Values.langfuse.enabled }}
# Job to create the langfuse database in PostgreSQL
# Runs as a Helm post-install hook after PostgreSQL is up
# Uses the postgres admin user (POSTGRESQL_ADMIN_PASSWORD) since the app user lacks CREATEDB
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init-langfuse-db
  labels:
    {{- include "langflow-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: {{ .Values.postgresql.image }}
          command:
            - /bin/bash
            - -c
            - |
              # Wait for PostgreSQL to be ready
              for i in $(seq 1 30); do
                pg_isready -h {{ .Release.Name }}-postgresql -p 5432 && break
                echo "Waiting for PostgreSQL... ($i/30)"
                sleep 5
              done
              # Create langfuse database using postgres admin user
              PGPASSWORD={{ .Values.global.postgresql.password }} psql \
                -h {{ .Release.Name }}-postgresql \
                -U postgres \
                -tc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'" | grep -q 1 || \
              PGPASSWORD={{ .Values.global.postgresql.password }} psql \
                -h {{ .Release.Name }}-postgresql \
                -U postgres \
                -c "CREATE DATABASE langfuse OWNER {{ .Values.global.postgresql.username }}"
              echo "Langfuse database ready."
{{- end }}