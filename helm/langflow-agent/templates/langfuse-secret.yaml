{{- if .Values.langfuse.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-langfuse-credentials
  labels:
    {{- include "langflow-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuse.publicKey | default "pk-lf-auto-generated" | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuse.secretKey | default "sk-lf-auto-generated" | quote }}
  LANGFUSE_ADMIN_PASSWORD: {{ .Values.langfuse.adminPassword | default "admin123" | quote }}
{{- end }}
