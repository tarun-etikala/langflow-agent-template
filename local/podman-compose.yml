version: "3.8"

services:
  # ── Langflow (UI + Server) ─────────────────────────────────────────
  langflow:
    image: docker.io/langflowai/langflow:1.7.1
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/${POSTGRES_DB:-langflow}"
      LANGFLOW_CONFIG_DIR: /var/lib/langflow
      # Model endpoint — points to local Ollama by default
      OPENAI_API_BASE: "http://ollama:11434/v1"
      OPENAI_API_KEY: "not-needed"
      OLLAMA_BASE_URL: "http://ollama:11434"
      # Langfuse tracing (native Langflow support — just env vars)
      LANGFUSE_HOST: "http://langfuse:3000"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-lf-dev-public}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-lf-dev-secret}"
    volumes:
      - langflow_data:/var/lib/langflow
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langflow}
      POSTGRES_DB: ${POSTGRES_DB:-langflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Ollama (Local LLM) ─────────────────────────────────────────────
  ollama:
    image: docker.io/ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Langfuse (Tracing — native Langflow integration) ─────────────────
  langfuse:
    image: docker.io/langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-dev-secret"
      SALT: "local-dev-salt"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  langflow_data:
  postgres_data:
  ollama_data: